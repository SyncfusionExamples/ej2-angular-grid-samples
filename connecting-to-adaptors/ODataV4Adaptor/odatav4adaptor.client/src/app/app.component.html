<ejs-grid #grid [dataSource]='data' [allowPaging]="true" [pageSettings]="pageSettings" [allowSorting]="true" [allowFiltering]="true" [editSettings]="editSettings" [toolbar]="toolbar" >
  <e-columns>
    <e-column field='OrderID' headerText='Order ID' isPrimaryKey=true width='150' [validationRules]='orderIDRules' textAlign='Right'></e-column>
    <e-column field='CustomerID' headerText='Customer ID' [validationRules]='customerIDRules' width='150'></e-column>
    <e-column field='EmployeeID' headerText='Employee ID' width='150' textAlign='Right'></e-column>
    <e-column field='ShipCountry' headerText='Ship Country' width='150'></e-column>
  </e-columns>
</ejs-grid>

<ejs-grid #grid [dataSource]='data' [allowGrouping]="true" [groupSettings]="groupOptions" [allowPaging]="true" [allowFiltering]="true" [toolbar]="toolbar" [allowSorting]="true" [editSettings]="editSettings">
  <e-columns>
    <e-column field='OrderID' headerText='Order ID' width='120' textAlign='Right' isPrimaryKey="true" [validationRules]='orderIDRules'></e-column>
    <e-column field='CustomerID' headerText='Customer ID' [validationRules]='customerIDRules' width='160'></e-column>
    <e-column field='ShipCity' headerText='Ship City' width='150'></e-column>
    <e-column field='Freight' headerText='Freight' format='C2' width='150'></e-column>
    <e-column field='ShipCountry' headerText='Ship Country' width='150'></e-column>
  </e-columns>
  <e-aggregates>
    <e-aggregate>
      <e-columns>
        <e-column field="Freight" type="max">
          <ng-template #groupCaptionTemplate let-data>Max: {{data.max}}</ng-template>
        </e-column>
      </e-columns>
    </e-aggregate>
  </e-aggregates>
</ejs-grid>

<ejs-grid #grid [dataSource]='data' [editSettings]="editSettings" [toolbar]="toolbar" [allowFiltering]="true" [allowPaging]="true" [allowSorting]="true" height="320">
  <e-columns>
    <e-column field='OrderID' headerText='Order ID' isPrimaryKey=true [validationRules]='orderIDRules' textAlign='Right' width='150'></e-column>
    <e-column field='CustomerID' headerText='Customer ID' [validationRules]='customerIDRules' width='150'></e-column>
    <e-column field='ShipCity' headerText='Ship City' width='150' ></e-column>
    <e-column field='ShipCountry' headerText='Ship Country' width='150'></e-column>
  </e-columns>
</ejs-grid>

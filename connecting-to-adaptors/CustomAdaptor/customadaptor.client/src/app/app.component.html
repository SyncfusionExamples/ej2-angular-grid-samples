<ejs-grid #grid [dataSource]='data' [allowFiltering]="true" [allowSorting]="true" [allowPaging]="true" [toolbar]="toolbar" [editSettings]="editSettings">
  <e-columns>
    <e-column field='SNo' headerText='SNO' [allowFiltering]="false" [allowSorting]="false" [allowSearching]="false" [isIdentity]="true" width='150'></e-column>
    <e-column field='OrderID' headerText='Order ID' width='150' textAlign='Right' isPrimaryKey="true" [validationRules]='orderIDRules'></e-column>
    <e-column field='CustomerID' headerText='Customer ID' [validationRules]='customerIDRules' width='150'></e-column>
    <e-column field='EmployeeID' headerText='Employee ID' textAlign='Right' width='150'></e-column>
    <e-column field='ShipCountry' headerText='Ship Country' width='150'></e-column>
  </e-columns>
</ejs-grid>
